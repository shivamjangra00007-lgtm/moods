<!DOCTYPE html>
<html>
<head>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #fdbbf7, #f1deef);
            font-family: Arial, sans-serif;
            perspective: 1600px;
            overflow: hidden;
        }

        .scene {
            width: 300px;
            height: 300px;
            transform-style: preserve-3d;
            cursor: grab;
        }

        .cylinder {
            position: relative;
            width: 200px;
            height: 300px;
            transform-style: preserve-3d;
        }

        .card {
            position: absolute;
            width: 180px;
            height: 260px;
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.25);
            border: 1px solid rgba(255,255,255,0.4);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transition: opacity 0.3s ease;
            backface-visibility: visible;
            opacity: 0.3;
            text-align: center;
        }

        .controls {
    position: absolute;
    bottom: 40px;
    display: flex;
    gap: 20px;
}

.controls button {
    padding: 10px 18px;
    border-radius: 25px;
    border: none;
    cursor: pointer;
    background: rgba(255,255,255,0.7);
    font-size: 16px;
    transition: 0.3s;
}

.controls button:hover {
    background: white;
    transform: scale(1.1);
}

        .title {
            font-weight: lighter;
            font-size: 15px;
        }

        .message {
            font-size: 13px;
            min-height: 80px;
        }

        button {
            padding: 6px 14px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            background: rgba(255,255,255,0.6);
            font-weight: bold;
        }

        /* Position cards around cylinder */
        .card:nth-child(1) { transform: rotateY(0deg) translateZ(250px); }
        .card:nth-child(2) { transform: rotateY(60deg) translateZ(250px); }
        .card:nth-child(3) { transform: rotateY(120deg) translateZ(250px); }
        .card:nth-child(4) { transform: rotateY(180deg) translateZ(250px); }
        .card:nth-child(5) { transform: rotateY(240deg) translateZ(250px); }
        .card:nth-child(6) { transform: rotateY(300deg) translateZ(250px); }

    </style>
</head>
<body>

    <div class="cylinder" id="cylinder">

    </div>
</div>
<div class="controls">
    <button id="prev">⏪</button>
    <button id="next">⏩</button>
</div>

<script>
    const scene = document.getElementById("scene");
    const cylinder = document.getElementById("cylinder");
    const cards = document.querySelectorAll(".card");

    let isDragging = false;
    let startX = 0;
    let startY = 0;
    let rotX = 0;
    let rotY = 0;

    const totalCards = cards.length;
    const anglePerCard = 360 / totalCards;

    function updateOpacity() {
        cards.forEach((card, index) => {
            let cardAngle = index * anglePerCard;
            let relativeAngle = (cardAngle + rotY) % 360;
            if (relativeAngle < 0) relativeAngle += 360;

            let distanceFromFront = Math.min(
                Math.abs(relativeAngle),
                Math.abs(360 - relativeAngle)
            );

            let opacity = 1 - (distanceFromFront / 180);
            opacity = Math.max(0.2, opacity);
            card.style.opacity = opacity;
        });
    }

    function autoRotate() {
        if (!isDragging) {
            rotY += 0.05; // very slow rotation
            cylinder.style.transform = `
                rotateX(${rotX}deg)
                rotateY(${rotY}deg)
            `;
            updateOpacity();
        }
        requestAnimationFrame(autoRotate);
    }

    autoRotate();

    scene.addEventListener("mousedown", (e) => {
        isDragging = true;
        startX = e.clientX;
        startY = e.clientY;
        scene.style.cursor = "grabbing";
    });

    document.addEventListener("mousemove", (e) => {
        if (!isDragging) return;

        let deltaX = e.clientX - startX;
        let deltaY = e.clientY - startY;

        cylinder.style.transform = `
            rotateX(${rotX - deltaY * 0.5}deg)
            rotateY(${rotY + deltaX * 0.5}deg)
        `;
    });

    document.addEventListener("mouseup", (e) => {
        if (!isDragging) return;

        let deltaX = e.clientX - startX;
        let deltaY = e.clientY - startY;

        rotY += deltaX * 0.5;
        rotX -= deltaY * 0.5;

        isDragging = false;
        scene.style.cursor = "grab";
    });

    function typeWriter(element, text, speed = 20) {
        element.textContent = "";
        let i = 0;
        const interval = setInterval(() => {
            element.textContent += text.charAt(i);
            i++;
            if (i >= text.length) clearInterval(interval);
        }, speed);
    }

    cards.forEach(card => {
        const button = card.querySelector("button");
        const messageDiv = card.querySelector(".message");
        const text = card.getAttribute("data-text");

        button.addEventListener("click", (e) => {
            e.stopPropagation();
            typeWriter(messageDiv, text);
        });
    });

    updateOpacity();
    const nextBtn = document.getElementById("next");
const prevBtn = document.getElementById("prev");

let currentIndex = 0;

function rotateToIndex(index) {
    rotY = -index * anglePerCard;

    cylinder.style.transform = `
        rotateX(${rotX}deg)
        rotateY(${rotY}deg)
    `;

    updateCards();
}

nextBtn.addEventListener("click", () => {
    currentIndex = (currentIndex + 1) % totalCards;
    rotateToIndex(currentIndex);
});

prevBtn.addEventListener("click", () => {
    currentIndex = (currentIndex - 1 + totalCards) % totalCards;
    rotateToIndex(currentIndex);
});
</script>

</body>
</html>
